<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran Video Maker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen flex flex-col">

    <header class="p-6 flex justify-between items-center glass sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-emerald-500 rounded-lg flex items-center justify-center neon-glow">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-slate-900"><path d="m12 19 7-7 3 3-7 7-3-3z"/><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="m2 2 20 20"/></svg>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-emerald-400">QURAN <span class="text-white">PRO</span></h1>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-12 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-4 space-y-6">
            <div class="glass p-8 rounded-3xl space-y-6">
                <h2 class="text-xl font-bold text-emerald-400 border-b border-slate-800 pb-4">إعدادات المشهد</h2>
                
                <div class="space-y-2">
                    <label class="text-sm text-slate-400">اختر القارئ</label>
                    <select id="reciter-select" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl focus:ring-2 ring-emerald-500 outline-none"></select>
                </div>

                <div class="space-y-2">
                    <label class="text-sm text-slate-400">السورة</label>
                    <select id="surah-select" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl"></select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-sm text-slate-400">من آية</label>
                        <input type="number" id="start-ayah" value="1" min="1" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm text-slate-400">إلى آية</label>
                        <input type="number" id="end-ayah" value="5" min="1" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-sm text-slate-400">النمط البصري</label>
                    <select id="visual-style" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl">
                        <option value="emerald">أخضر زمردي</option>
                        <option value="royal">أرجواني ملكي</option>
                        <option value="ocean">أزرق عميق</option>
                    </select>
                </div>

                <button id="render-btn" class="w-full py-4 bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold rounded-xl transition-all shadow-lg shadow-emerald-500/20">
                    بدء الرندر الاحترافي
                </button>
            </div>
        </div>

        <div class="lg:col-span-8 flex flex-col items-center justify-center space-y-6">
            <div class="relative w-full aspect-video group">
                <canvas id="main-canvas" width="1920" height="1080" class="w-full h-auto bg-black border border-slate-800 rounded-2xl shadow-2xl"></canvas>
                <div id="loader" class="absolute inset-0 flex items-center justify-center bg-slate-950/80 rounded-2xl hidden">
                    <div class="text-center space-y-4">
                        <div class="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
                        <p class="text-emerald-400 font-medium">جاري معالجة البيانات والآيات...</p>
                    </div>
                </div>
            </div>
            
            <div id="download-area" class="hidden">
                <button id="download-btn" class="px-10 py-4 bg-white text-slate-900 font-black rounded-full hover:scale-105 transition-all">
                    تحميل الفيديو بجودة 1080p
                </button>
            </div>
        </div>

    </main>

    <script src="js/app.js"></script>
</body>
</html>
